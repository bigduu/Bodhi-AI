name: "publish"

on:
  workflow_dispatch:
    inputs:
      lotus_version:
        description: "Lotus npm version to bundle (default: latest)"
        required: false
        default: "latest"
  push:
    branches:
      - release

jobs:
  publish-tauri:
    env:
      LOTUS_SOURCE: package
      LOTUS_PACKAGE_NAME: "@bigduu/lotus"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: ""
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: "--bundles nsis"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install shell dependencies
        run: npm ci

      - name: Install Lotus package
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.lotus_version }}" ]; then
            LOTUS_VERSION="${{ github.event.inputs.lotus_version }}"
          else
            LOTUS_VERSION="latest"
          fi
          echo "Using @bigduu/lotus@${LOTUS_VERSION}"
          npm install --no-save "@bigduu/lotus@${LOTUS_VERSION}"

      - name: Print Lotus source resolution
        run: npm run web:source:info

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Templates out the app version from Cargo.toml
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false # Release directly (was true for draft)
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Build Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
          if-no-files-found: warn
