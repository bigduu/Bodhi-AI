name: "publish"

on:
  workflow_dispatch:
    inputs:
      bodhi_version:
        description: "Bodhi app version to publish (default: keep current app version)"
        required: false
        default: "latest"
      bamboo_version:
        description: "bamboo-agent crate version to embed (default: latest)"
        required: false
        default: "latest"
      lotus_version:
        description: "Lotus npm version to bundle (default: latest)"
        required: false
        default: "latest"

jobs:
  publish-tauri:
    env:
      BAMBOO_CRATE_NAME: "bamboo-agent"
      LOTUS_SOURCE: package
      LOTUS_PACKAGE_NAME: "@bigduu/lotus"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_PROGRESS: "false"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
            artifact_name: "macos-x64"
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
            artifact_name: "macos-arm64"
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            args: "--target x86_64-unknown-linux-gnu"
            artifact_name: "linux-x64"
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
            artifact_name: "windows-x64"
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Verify migration boundary
        run: npm run web:verify:migration

      - name: Verify docs boundary
        run: npm run web:verify:docs-boundary

      - name: Resolve Bodhi release version
        id: release_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.bodhi_version }}" ] && [ "${{ github.event.inputs.bodhi_version }}" != "latest" ]; then
            VERSION="${{ github.event.inputs.bodhi_version }}"
          else
            VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Bodhi release version: ${VERSION}"

      - name: Set Bodhi app version (workflow override)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.bodhi_version != '' && github.event.inputs.bodhi_version != 'latest'
        shell: bash
        run: |
          TARGET_VERSION="${{ steps.release_version.outputs.version }}"
          export TARGET_VERSION
          node <<'NODE'
          const fs = require('node:fs');

          const target = process.env.TARGET_VERSION;
          const cargoPath = 'src-tauri/Cargo.toml';
          const tauriConfigPath = 'src-tauri/tauri.conf.json';

          const cargoBefore = fs.readFileSync(cargoPath, 'utf8');
          const cargoVersionPattern = /^version\s*=\s*"[^"]+"/m;
          if (!cargoVersionPattern.test(cargoBefore)) {
            throw new Error('Unable to find version entry in src-tauri/Cargo.toml');
          }
          const cargoAfter = cargoBefore.replace(/^version\s*=\s*"[^"]+"/m, `version = "${target}"`);
          if (cargoBefore !== cargoAfter) {
            fs.writeFileSync(cargoPath, cargoAfter);
          }

          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          tauriConfig.version = target;
          fs.writeFileSync(tauriConfigPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);
          NODE

          echo "Using bodhi version override: ${TARGET_VERSION}"
          grep '^version = ' src-tauri/Cargo.toml | head -1
          node -p "require('./src-tauri/tauri.conf.json').version"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: "bodhi-release-${{ matrix.target }}"
          cache-on-failure: true

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Switch bamboo-agent dependency to crates.io
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const cargoTomlPath = 'Cargo.toml';
          const localPathDep = 'bamboo-agent = { path = "../bamboo" }';
          const cratesIoDep = 'bamboo-agent = "*"';
          const before = fs.readFileSync(cargoTomlPath, 'utf8');
          if (!before.includes(localPathDep)) {
            console.log('bamboo-agent already points to crates.io');
            process.exit(0);
          }
          const after = before.replace(localPathDep, cratesIoDep);
          fs.writeFileSync(cargoTomlPath, after);
          console.log('Switched bamboo-agent dependency to crates.io for release build');
          NODE

      - name: Resolve bamboo-agent dependency
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.bamboo_version }}" ] && [ "${{ github.event.inputs.bamboo_version }}" != "latest" ]; then
            export BAMBOO_VERSION="${{ github.event.inputs.bamboo_version }}"
            echo "Using ${BAMBOO_CRATE_NAME}@${BAMBOO_VERSION}"
          else
            unset BAMBOO_VERSION
            echo "Using latest compatible ${BAMBOO_CRATE_NAME} from crates.io"
          fi

          node <<'NODE'
          const fs = require('node:fs');
          const cargoTomlPath = 'Cargo.toml';
          const version = process.env.BAMBOO_VERSION || '';
          if (!version) process.exit(0);
          const content = fs.readFileSync(cargoTomlPath, 'utf8');
          const updated = content.replace(
            /bamboo-agent\s*=\s*\"[^\"]*\"/,
            `bamboo-agent = "${version}"`,
          );
          fs.writeFileSync(cargoTomlPath, updated);
          console.log(`Pinned bamboo-agent to ${version}`);
          NODE

          cargo update
          cargo tree --manifest-path src-tauri/Cargo.toml --locked -p bodhi | grep -m1 "${BAMBOO_CRATE_NAME} v"

      - name: Install shell dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Install Lotus package
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.lotus_version }}" ]; then
            LOTUS_VERSION="${{ github.event.inputs.lotus_version }}"
          else
            LOTUS_VERSION="latest"
          fi
          echo "Using @bigduu/lotus@${LOTUS_VERSION}"
          npm install --no-save "@bigduu/lotus@${LOTUS_VERSION}"

      - name: Stage Lotus dist for bundling
        shell: bash
        run: |
          npm run web:build
          test -f .lotus-dist/index.html
          echo "Lotus dist staged in .lotus-dist"

      - name: Print Lotus source resolution
        run: npm run web:source:info

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v${{ steps.release_version.outputs.version }}
          releaseName: "App v${{ steps.release_version.outputs.version }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false # Release directly (was true for draft)
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Build Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn
