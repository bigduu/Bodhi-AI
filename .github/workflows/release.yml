name: "publish"

on:
  workflow_dispatch:
    inputs:
      bamboo_version:
        description: "bamboo-agent crate version to embed (default: latest)"
        required: false
        default: "latest"
      lotus_version:
        description: "Lotus npm version to bundle (default: latest)"
        required: false
        default: "latest"
  push:
    branches:
      - release

jobs:
  publish-tauri:
    env:
      BAMBOO_CRATE_NAME: "bamboo-agent"
      LOTUS_SOURCE: package
      LOTUS_PACKAGE_NAME: "@bigduu/lotus"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
            artifact_name: "macos-x64"
            artifact_paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
            artifact_name: "macos-arm64"
            artifact_paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          - platform: "ubuntu-22.04"
            target: "x86_64-unknown-linux-gnu"
            args: "--target x86_64-unknown-linux-gnu"
            artifact_name: "linux-x64"
            artifact_paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
            artifact_name: "windows-x64"
            artifact_paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Resolve bamboo-agent dependency
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.bamboo_version }}" ] && [ "${{ github.event.inputs.bamboo_version }}" != "latest" ]; then
            BAMBOO_VERSION="${{ github.event.inputs.bamboo_version }}"
            echo "Using ${BAMBOO_CRATE_NAME}@${BAMBOO_VERSION}"
            cargo update -p "${BAMBOO_CRATE_NAME}" --precise "${BAMBOO_VERSION}"
          else
            echo "Using latest compatible ${BAMBOO_CRATE_NAME} from crates.io"
            cargo update -p "${BAMBOO_CRATE_NAME}"
          fi

          cargo tree --manifest-path src-tauri/Cargo.toml --locked -p bodhi | grep -m1 "${BAMBOO_CRATE_NAME} v"

      - name: Install shell dependencies
        run: npm ci

      - name: Install Lotus package
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.lotus_version }}" ]; then
            LOTUS_VERSION="${{ github.event.inputs.lotus_version }}"
          else
            LOTUS_VERSION="latest"
          fi
          echo "Using @bigduu/lotus@${LOTUS_VERSION}"
          npm install --no-save "@bigduu/lotus@${LOTUS_VERSION}"

      - name: Stage Lotus dist for bundling
        shell: bash
        run: |
          npm run web:build
          test -f .lotus-dist/index.html
          echo "Lotus dist staged in .lotus-dist"

      - name: Print Lotus source resolution
        run: npm run web:source:info

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # Templates out the app version from Cargo.toml
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false # Release directly (was true for draft)
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Build Artifacts to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn
